name: Build Linux

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string

jobs:
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - uses: pnpm/action-setup@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            xdg-utils

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set release version
        run: node scripts/sync-version.js "${{ inputs.version }}"

      - name: Build app
        env:
          VITE_TAURI_APP_SCHEME: ${{ vars.VITE_TAURI_APP_SCHEME }}
          VITE_BETTER_AUTH_BASE_URL: ${{ vars.VITE_BETTER_AUTH_BASE_URL }}
          VITE_WEBSOCKET_BASE_URL: ${{ vars.VITE_WEBSOCKET_BASE_URL }}
          VITE_SETTINGS_FILE_NAME: ${{ vars.VITE_SETTINGS_FILE_NAME }}
          VITE_CLIPBOARD_PER_PAGE_LIMIT_OPTIONS: ${{ vars.VITE_CLIPBOARD_PER_PAGE_LIMIT_OPTIONS }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build --bundles appimage deb rpm

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: mexboard-linux
          path: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
          if-no-files-found: error
