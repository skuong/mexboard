name: Build Windows

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - uses: pnpm/action-setup@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set release version
        run: node scripts/sync-version.js "${{ inputs.version }}"

      - name: Build app
        env:
          VITE_TAURI_APP_SCHEME: ${{ vars.VITE_TAURI_APP_SCHEME }}
          VITE_BETTER_AUTH_BASE_URL: ${{ vars.VITE_BETTER_AUTH_BASE_URL }}
          VITE_WEBSOCKET_BASE_URL: ${{ vars.VITE_WEBSOCKET_BASE_URL }}
          VITE_SETTINGS_FILE_NAME: ${{ vars.VITE_SETTINGS_FILE_NAME }}
          VITE_CLIPBOARD_PER_PAGE_LIMIT_OPTIONS: ${{ vars.VITE_CLIPBOARD_PER_PAGE_LIMIT_OPTIONS }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: pnpm tauri build --bundles nsis msi

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: mexboard-windows
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error
