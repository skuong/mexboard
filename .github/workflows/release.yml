name: Release

on:
  push:
    branches:
      - main
      - beta

permissions:
  contents: write

jobs:
  plan-release:
    name: Plan Release
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.plan.outputs.released }}
      version: ${{ steps.plan.outputs.version }}
      tag: ${{ steps.plan.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - uses: pnpm/action-setup@v6

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch tags
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          git fetch --tags --force

      - name: Compute next release
        id: plan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/next-release-version.js

      - name: Output release plan
        run: |
          echo "Release needed: ${{ steps.plan.outputs.released }}"
          echo "Version: ${{ steps.plan.outputs.version }}"
          echo "Tag: ${{ steps.plan.outputs.tag }}"

  check-format:
    needs: plan-release
    if: needs.plan-release.outputs.released == 'true'
    uses: ./.github/workflows/format.yml

  release-linux:
    name: Release Build (Linux)
    needs:
      - plan-release
      - check-format
    if: |
      needs.plan-release.outputs.released == 'true' &&
      needs.check-format.result == 'success'
    uses: ./.github/workflows/build-linux.yml
    with:
      version: ${{ needs.plan-release.outputs.version }}
    secrets: inherit

  release-windows:
    name: Release Build (Windows)
    needs:
      - plan-release
      - check-format
    if: |
      needs.plan-release.outputs.released == 'true' &&
      needs.check-format.result == 'success'
    uses: ./.github/workflows/build-windows.yml
    with:
      version: ${{ needs.plan-release.outputs.version }}
    secrets: inherit

  release-macos:
    name: Release Build (macOS)
    needs:
      - plan-release
      - check-format
    if: |
      needs.plan-release.outputs.released == 'true' &&
      needs.check-format.result == 'success'
    uses: ./.github/workflows/build-macos.yml
    with:
      version: ${{ needs.plan-release.outputs.version }}
    secrets: inherit

  publish-release:
    name: Publish Release
    needs:
      - plan-release
      - check-format
      - release-linux
      - release-windows
      - release-macos
    if: |
      needs.plan-release.outputs.released == 'true' &&
      needs.check-format.result == 'success' &&
      needs.release-linux.result == 'success' &&
      needs.release-windows.result == 'success' &&
      needs.release-macos.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download build artifacts
        uses: actions/download-artifact@v6
        with:
          pattern: mexboard-*
          path: release-assets
          merge-multiple: true

      - name: Publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm exec semantic-release
